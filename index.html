<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poker Wedding</title>
    <link rel="preload" as="image" href="img1.png">
    <link rel="preload" as="image" href="img2.png">
    <link rel="preload" as="image" href="img3.png">
    <link rel="preload" as="image" href="img4.png">
    <link rel="preload" as="image" href="img5.png">
    <link rel="preload" as="image" href="img6.png">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Georgia, serif;
            background:
                radial-gradient(circle at center, rgba(0, 0, 0, 0.6) 0%, transparent 60%),
                linear-gradient(180deg, #0b5e2b 0%, #063d1b 100%);
            min-height: 100vh;
            overflow-x: hidden;
            color: white;
        }

        /* floating suits */

        .hearts-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .heart-particle {
            position: absolute;
            font-size: 22px;
            color: #ffd700;
            animation: floatHearts 8s infinite linear;
        }

        @keyframes floatHearts {
            0% {
                transform: translateY(100vh) rotate(0deg) scale(0.6);
                opacity: 1;
            }

            100% {
                transform: translateY(-120px) rotate(360deg) scale(1);
                opacity: 0;
            }
        }

        /* container */

        .flower-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            z-index: 1000;
        }

        /* deck */

        /* .deck-center {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 130px;
            height: 180px;
            transform: translate(-50%, -50%);
            border-radius: 12px;
            border: 4px solid #111;
            background:
                repeating-linear-gradient(45deg,
                    #8b0000,
                    #8b0000 10px,
                    #b30000 10px,
                    #b30000 20px);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.7);
        } */

        .deck-center {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 130px;
            height: 180px;
            transform: translate(-50%, -50%);
            border-radius: 12px;

            /* white card edge */
            border: 6px solid #ffffff;

            /* classic poker back pattern */
            background:
                radial-gradient(circle at center, #ffffff 1px, transparent 1px),
                radial-gradient(circle at center, #ffffff 1px, transparent 1px),
                linear-gradient(135deg, #b30000, #6b0000);

            background-size: 12px 12px, 12px 12px, 100% 100%;
            background-position: 0 0, 6px 6px, 0 0;

            /* gold frame */
            box-shadow:
                0 0 25px rgba(255, 215, 0, 0.6),
                0 10px 30px rgba(0, 0, 0, 0.8),
                inset 0 0 10px rgba(0, 0, 0, 0.6);

        }

        /* deck thickness effect */
        .deck-center::before,
        .deck-center::after {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 12px;
            background: inherit;
            border: 6px solid #ffffff;
            z-index: -1;
        }

        .deck-center::before {
            transform: translateY(6px) scale(0.98);
            opacity: 0.8;
        }

        .deck-center::after {
            transform: translateY(12px) scale(0.96);
            opacity: 0.6;
        }

        /* card animation */

        .card {
            position: absolute;
            width: 140px;
            height: 200px;
            top: 50%;
            left: 50%;
            transform-origin: center;
            animation: spin 4s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }

        .card img {
            width: 100%;
            height: 100%;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.6);
        }

        /* animation */

        @keyframes spin {

            0% {
                transform: translate(-50%, -50%) rotate(var(--start-rot)) scale(0.7);
            }

            30% {
                transform: translate(-50%, -50%) rotate(var(--start-rot)) scale(1.1);
            }

            100% {
                transform: translate(var(--final-x), var(--final-y)) rotate(var(--final-rot)) scale(1.2);
            }

        }

        /* final card positions */

        .card.final-1 {
            --final-x: -70vw;
            --final-y: -20vh;
            --final-rot: 360deg;
        }

        .card.final-2 {
            --final-x: -30vw;
            --final-y: -60vh;
            --final-rot: 420deg;
        }

        .card.final-3 {
            --final-x: 40vw;
            --final-y: -40vh;
            --final-rot: 460deg;
        }

        .card.final-4 {
            --final-x: 70vw;
            --final-y: 0vh;
            --final-rot: 500deg;
        }

        /* hero */

        .hero {
            margin-top: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: #ffd700;
            opacity: 0;
            animation: fadeIn 2s ease 8s forwards;
            position: relative;
            z-index: 10;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .hero h1 {
            font-size: 4rem;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
        }

        .hero p {
            font-size: 1.5rem;
        }

        /* gallery */

        .gallery {
            padding: 5rem 2rem;
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 2rem;
            opacity: 0;
            transform: scale(0.8);
            animation: fadeInUp 1s ease 5s forwards;
            position: relative;
            z-index: 10;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .photo-frame {
            border-radius: 20px;
            overflow: hidden;
            border: 6px solid #ffd700;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            cursor: pointer;
            opacity: 0;
            transform: scale(0.5) rotate(180deg);
            animation: zoomIn 1s ease 6s forwards;
        }

        .photo-frame:nth-child(1) {
            animation-delay: 6s;
        }

        .photo-frame:nth-child(2) {
            animation-delay: 6.2s;
        }

        .photo-frame:nth-child(3) {
            animation-delay: 6.4s;
        }

        .photo-frame:nth-child(4) {
            animation-delay: 6.6s;
        }

        .photo-frame:nth-child(5) {
            animation-delay: 6.8s;
        }

        .photo-frame:nth-child(6) {
            animation-delay: 7s;
        }

        @keyframes zoomIn {
            to {
                opacity: 1;
                transform: scale(1) rotate(0deg);
            }
        }

        .photo-frame img {
            width: 100%;
            height: 720px;
            object-fit: cover;
            display: block;
            backface-visibility: hidden;
            transform: translateZ(0);
        }
    </style>
</head>

<body>

    <div class="hearts-bg" id="heartsBg"></div>

    <div class="flower-container" id="flower">

        <div class="deck-center"></div>

        <div class="card final-1" style="--start-rot:0deg;">
            <img src="https://deckofcardsapi.com/static/img/QH.png">
        </div>

        <div class="card final-2" style="--start-rot:90deg;">
            <img src="https://deckofcardsapi.com/static/img/QD.png">
        </div>

        <div class="card final-3" style="--start-rot:180deg;">
            <img src="https://deckofcardsapi.com/static/img/QC.png">
        </div>

        <div class="card final-4" style="--start-rot:270deg;">
            <img src="https://deckofcardsapi.com/static/img/QS.png">
        </div>

    </div>

    <section class="hero">
        <h1>Happy Wedding</h1>
        <p>Celebrating the love of Anusuya & Debanka</p>
    </section>

    <section class="gallery">
        <div class="photo-frame"><img src="img1.png" loading="eager" decoding="sync"></div>
        <div class="photo-frame"><img src="img2.png" loading="eager" decoding="sync"></div>
        <div class="photo-frame"><img src="img3.png" loading="eager" decoding="sync"></div>
        <div class="photo-frame"><img src="img4.png" loading="eager" decoding="sync"></div>
        <div class="photo-frame"><img src="img5.png" loading="eager" decoding="sync"></div>
        <div class="photo-frame"><img src="img6.png" loading="eager" decoding="sync"></div>
    </section>

    <script>

        function createHeart() {

            const heart = document.createElement('div');
            heart.className = 'heart-particle';

            heart.innerHTML = ['♠', '♥', '♦', '♣', '🃏'][Math.floor(Math.random() * 5)];

            heart.style.left = Math.random() * 100 + '%';
            heart.style.animationDuration = (Math.random() * 3 + 6) + 's';
            heart.style.animationDelay = Math.random() * 2 + 's';
            // document.getElementById('heartsBg').appendChild(heart);
            setTimeout(() => heart.remove(), 9000);

        }

        setInterval(createHeart, 400);

        setTimeout(() => {
            document.getElementById('flower').style.opacity = '0';
        }, 5000);

    </script>

</body>

</html>
